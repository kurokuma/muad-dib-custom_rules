rules:
  - id: CUSTOM-STR-001
    name: Suspicious eval with base64
    severity: high
    confidence: medium
    target: file_content
    file_glob:
      - "**/*.js"
    exclude_glob:
      - "**/test/**"
      - "**/docs/**"
    match:
      type: regex
      pattern: "(eval\\s*\\(|Function\\s*\\().{0,200}(atob|Buffer\\.from\\([^\\)]*base64)"
      flags: "is"
    description: "eval/function use near base64 decoding"
    mitre: T1059
    references:
      - "https://attack.mitre.org/techniques/T1059/"

  - id: CUSTOM-STR-002
    name: Curl pipe bash
    severity: critical
    confidence: high
    target: file_content
    file_glob:
      - "**/*.sh"
      - "**/package.json"
    match:
      type: contains_all
      patterns:
        - "curl "
        - "| bash"
    description: "curl piped to bash"
